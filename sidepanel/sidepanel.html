<!DOCTYPE html>
<html lang="en" data-theme="august-default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkMap</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/tree.css">
  <link rel="stylesheet" href="styles/search.css">
  <link rel="stylesheet" href="styles/context-menu.css">
  <link rel="stylesheet" href="styles/session.css">
  <link rel="stylesheet" href="styles/command-palette.css">
  <link rel="stylesheet" href="styles/workspace.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search tabs..." autocomplete="off">
        <button id="search-clear" class="search-clear" hidden aria-label="Clear search">&times;</button>
      </div>
      <div class="toolbar-buttons">
        <button id="undo-close-btn" title="Undo Close Tab (Ctrl+Z)" aria-label="Undo Close Tab">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 5l-2 2 2 2"/>
            <path d="M1 7h8a3 3 0 1 1 0 6H8"/>
          </svg>
        </button>
        <button id="sessions-btn" title="Sessions" aria-label="Sessions">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="2" y="1.5" width="10" height="11" rx="1.5"/>
            <path d="M5 4.5h4M5 7h4M5 9.5h2"/>
          </svg>
        </button>
        <button id="recently-closed-btn" title="Recently Closed Tabs" aria-label="Recently Closed Tabs">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
            <circle cx="7" cy="7" r="5.5"/>
            <path d="M7 4v3.5l2.5 1.5"/>
          </svg>
        </button>
        <button id="collapse-all-btn" title="Collapse All" aria-label="Collapse All">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="1.5" y="1.5" width="11" height="11" rx="2"/>
            <path d="M4 7h6" stroke-width="1.5"/>
          </svg>
        </button>
        <button id="expand-all-btn" title="Expand All" aria-label="Expand All">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="1.5" y="1.5" width="11" height="11" rx="2"/>
            <path d="M4 7h6M7 4v6" stroke-width="1.5"/>
          </svg>
        </button>
        <button id="focus-mode-btn" title="Focus on Active Tab" aria-label="Focus on Active Tab">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="7" cy="7" r="2.5"/>
            <path d="M7 1v3M7 10v3M1 7h3M10 7h3"/>
          </svg>
        </button>
      </div>
      <button id="settings-btn" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
          <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.892 3.434-.901 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 00-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291a1.873 1.873 0 00-1.116-2.693l-.318-.094c-.835-.246-.835-1.428 0-1.674l.319-.094a1.873 1.873 0 001.115-2.693l-.16-.291c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.116l.094-.318z"/>
        </svg>
      </button>
    </header>

    <section id="pinned-tabs" class="tab-section" hidden>
      <div class="section-label">Pinned</div>
      <div id="pinned-list"></div>
    </section>

    <main id="tree-container"></main>

    <div id="workspace-bar"></div>

    <footer id="footer">
      <div class="tab-count"><span id="tab-count-num">0</span> tabs</div>
      <button id="add-new-tab-btn" class="add-new-tab-btn" title="Open a new tab">+ Add New Tab</button>
      <div class="theme-selector">
        <select id="theme-select">
          <optgroup label="August Suite">
            <option value="august-default">August</option>
            <option value="midnight-mars">Midnight Mars</option>
            <option value="deep-forest">Deep Forest</option>
            <option value="oceanic-depth">Oceanic Depth</option>
            <option value="palenight">Palenight</option>
            <option value="espresso">Espresso</option>
            <option value="cyberpunk-dim">Cyberpunk Dim</option>
            <option value="nord-darker">Nord</option>
            <option value="dracula-soft">Dracula</option>
            <option value="oled-void">OLED Void</option>
          </optgroup>
          <optgroup label="Cyberpunk Suite">
            <option value="arasaka-executive">Arasaka Executive</option>
            <option value="netrunner">Netrunner</option>
            <option value="synthwave-sunset">Synthwave Sunset</option>
            <option value="toxic-district">Toxic District</option>
            <option value="cyberpsychosis">Cyberpsychosis</option>
          </optgroup>
        </select>
      </div>
    </footer>
  </div>

  <div id="context-menu" class="context-menu" hidden></div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
